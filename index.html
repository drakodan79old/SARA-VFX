<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SÁDICO V-FX: MODO LIVE FINAL</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #0f0; }
        
        .stage { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* EL FEED DEL ARCAICO (SINCRONIZADO CON 8uATVan) */
        #remote-stream {
            width: 100%; height: 100%;
            z-index: 10;
            filter: contrast(1.2) brightness(1.1);
            pointer-events: none;
            border: none;
        }

        /* EL AURA CROMÁTICA (aura.webp) */
        .aura {
            position: absolute; width: 150%; height: 150%;
            mix-blend-mode: screen; pointer-events: none;
            transform-origin: center;
        }

        .atras { z-index: 5; opacity: 0.8; animation: portal 6s infinite alternate ease-in-out; }
        .adelante { z-index: 15; opacity: 0.4; mix-blend-mode: color-dodge; animation: flujo 3s infinite alternate-reverse; }

        @keyframes portal {
            0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg) blur(5px); }
            100% { transform: scale(1.2) rotate(15deg); filter: hue-rotate(180deg) blur(20px); }
        }

        @keyframes flujo {
            from { transform: translateY(40px) scale(1.1); }
            to { transform: translateY(-40px) scale(1.3); }
        }

        #ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2 style="margin:0;">SÁDICO V-FX: LIVE ENGINE</h2>
        <p>INPUT: REDMI A9 (ID: 8uATVan) | RENDER: i5</p>
        <p style="color: #fff; font-size: 10px;">STATUS: <span style="color:#0f0;">SINCRO ACTIVA</span></p>
    </div>

    <div class="stage">
        <!-- CAPA 1: Aura trasera -->
        <img src="aura.webp" class="aura atras">
        
        <!-- CAPA 2: EL VIDEO DEL ARCAICO (LINK BLINDADO) -->
        <iframe id="remote-stream" 
                src="https://vdo.ninja" 
                allow="autoplay;camera;microphone;fullscreen" 
                frameborder="0">
        </iframe>

        <!-- CAPA 3: Aura delantera -->
        <img src="aura.webp" class="aura adelante">
    </div>

</body>
</html>
