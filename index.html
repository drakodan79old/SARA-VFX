<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SÁDICO V-FX: REMOTE LIVE</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #0f0; }
        
        /* EL ESCENARIO SÁDICO */
        .stage { 
            position: relative; 
            width: 80vw; 
            height: 80vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 0 50px #0f0;
            border: 2px solid #0f0;
        }

        /* EL FEED REMOTO (EL ARCAICO) */
        #remote-stream {
            width: 100%; 
            height: 100%;
            z-index: 10;
            /* Filtros para darle look de software caro */
            filter: contrast(1.3) brightness(1.1) saturate(1.2);
            pointer-events: none;
        }

        /* LAS FLAMAS MÍSTICAS (AURA.WEBP) */
        .aura {
            position: absolute;
            width: 130%;
            height: 130%;
            mix-blend-mode: screen;
            pointer-events: none;
            transform-origin: center;
        }

        /* Aura trasera: Latido Neón */
        .atras { 
            z-index: 5; 
            opacity: 0.8;
            animation: latido-atras 4s infinite alternate ease-in-out;
        }

        /* Aura delantera: Energía Fluyente */
        .adelante { 
            z-index: 15; 
            opacity: 0.4;
            mix-blend-mode: color-dodge;
            animation: flujo-adelante 3s infinite alternate-reverse ease-in-out;
        }

        @keyframes latido-atras {
            0% { transform: scale(1); filter: hue-rotate(0deg) blur(5px); }
            100% { transform: scale(1.15); filter: hue-rotate(180deg) blur(15px); }
        }

        @keyframes flujo-adelante {
            from { transform: translateY(20px) scale(1.1) rotate(-5deg); }
            to { transform: translateY(-20px) scale(1.2) rotate(5deg); }
        }

        #ui-data { position: absolute; top: 15px; left: 15px; z-index: 100; text-shadow: 0 0 10px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-data">
        <h2 style="margin:0;">SÁDICO V-FX: REMOTE ENGINE</h2>
        <p>Input: REDMI A9 (VDO.ninja) | Render: i5 LA PEROLITA</p>
        <p style="color: #fff; font-size: 10px;">Status: <span style="color:#0f0;">SINCRO ACTIVA</span></p>
    </div>

    <div class="stage">
        <!-- CAPA 1: Aura trasera (Profundidad) -->
        <img src="aura.webp" class="aura atras">
        
        <!-- CAPA 2: El video del Arcaico en tiempo real -->
        <iframe id="remote-stream" 
                src="https://vdo.ninja" 
                allow="autoplay;camera;microphone" 
                frameborder="0">
        </iframe>

        <!-- CAPA 3: Aura delantera (Brillo sobre el YouTuber) -->
        <img src="aura.webp" class="aura adelante">
    </div>

</body>
</html>
