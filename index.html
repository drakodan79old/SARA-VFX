<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SÁDICO V-FX: IP-LIVE ENGINE</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #0f0; }
        
        .stage { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* EL FEED DEL ARCAICO (SUCCIÓN DIRECTA POR IP) */
        #remote-video {
            width: 100%; 
            height: 100%;
            object-fit: cover;
            z-index: 10;
            filter: contrast(1.3) brightness(1.1) saturate(1.2);
            border: none;
        }

        /* EL AURA MÍSTICA (ASSET A: aura.webp) */
        .aura {
            position: absolute;
            width: 150%;
            height: 150%;
            mix-blend-mode: screen;
            pointer-events: none;
            transform-origin: center;
        }

        /* Aura trasera: El Portal */
        .atras { 
            z-index: 5; 
            opacity: 0.9;
            animation: portal-atras 5s infinite alternate ease-in-out;
        }

        /* Aura delantera: El Ultra Instinto */
        .adelante { 
            z-index: 15; 
            opacity: 0.5;
            mix-blend-mode: color-dodge;
            animation: flujo-adelante 3s infinite alternate-reverse ease-in-out;
        }

        @keyframes portal-atras {
            0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg) blur(10px); }
            100% { transform: scale(1.2) rotate(10deg); filter: hue-rotate(180deg) blur(20px); }
        }

        @keyframes flujo-adelante {
            from { transform: translateY(40px) scale(1.1); filter: brightness(1); }
            to { transform: translateY(-40px) scale(1.3); filter: brightness(1.8); }
        }

        #ui-stats { position: absolute; top: 20px; left: 20px; z-index: 100; text-shadow: 0 0 10px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-stats">
        <h2 style="margin:0;">SÁDICO V-FX: IP-LIVE</h2>
        <p>INPUT: REDMI A9 (IP: 192.168.100.7) | RENDER: i5</p>
        <p style="color: #fff; font-size: 11px;">STATUS: <span style="color:#0f0; animation: blink 1s infinite;">● FEED IP ACTIVO</span></p>
    </div>

    <div class="stage">
        <!-- CAPA 1: Aura Profunda -->
        <img src="aura.webp" class="aura atras">
        
        <!-- CAPA 2: EL VIDEO DEL ARCAICO (SUCCIÓN DIRECTA) -->
        <img id="remote-video" src="http://192.168.100" crossorigin="anonymous">

        <!-- CAPA 3: Aura de Impacto -->
        <img src="aura.webp" class="aura adelante">
    </div>

    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>

</body>
</html>
