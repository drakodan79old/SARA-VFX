<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SÁDICO V-FX: SARA 2.5D</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: #fff; font-family: monospace; }
        
        .vfx-container { 
            position: relative; 
            width: 500px; 
            height: 80vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* ANCLA AL PISO */
        }

        /* SARA: El Activo Principal */
        .imante { 
            width: 80%; 
            z-index: 10; 
            position: relative;
            bottom: 0;
            filter: contrast(1.1) brightness(1.1);
        }

        /* EL GAS DE CONTORNO (NEÓN LATIENTE) */
        .gas-contorno {
            position: absolute;
            bottom: 0;
            width: 80%;
            height: 100%;
            z-index: 5;
            /* Usamos a Sara para el recorte del neón */
            -webkit-mask-image: url("sara_model.glb"); /* Nota: Si tienes un PNG de Sara úsalo aquí, si no, usamos el filtro directo */
            background: #0f0;
            animation: ascension-neon 3s infinite ease-in-out;
            transform-origin: bottom;
            opacity: 0.8;
            /* Si no tienes PNG, este filtro rodea la silueta de Sara */
            filter: drop-shadow(0 0 20px #0f0) drop-shadow(0 0 45px #0f0);
        }

        @keyframes ascension-neon {
            0%, 100% { 
                filter: drop-shadow(0 0 15px #0f0) drop-shadow(0 0 30px #0f0) hue-rotate(0deg);
                transform: scaleY(1); 
            }
            50% { 
                filter: drop-shadow(0 -30px 50px #0f0) drop-shadow(0 -60px 100px #0ff) hue-rotate(180deg);
                transform: scaleY(1.15); /* ESTIRA AL TOPE */
            }
        }

        /* FLAMAS MÍSTICAS (Asset A: aura.webp) */
        .joya { 
            position: absolute; 
            width: 140%; 
            height: 110%; /* Cubre todo el PNG */
            bottom: 0;
            filter: invert(1) hue-rotate(180deg) brightness(1.5) contrast(1.2);
            mix-blend-mode: screen; 
            pointer-events: none;
            transform-origin: bottom;
        }

        .atras { z-index: 1; opacity: 0.6; animation: flujo-v 4s infinite alternate; }
        .adelante { z-index: 15; opacity: 0.4; animation: flujo-v 3s infinite alternate-reverse; }

        @keyframes flujo-v {
            from { transform: scaleY(1) translateY(0); }
            to { transform: scaleY(1.3) translateY(-20px); }
        }

        /* TEXTO DE INTERFAZ */
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; color: #0f0; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>SÁDICO V-FX: MODO 2.5D</h2>
        <p>Activo: Sara | Render: Cromático V1.8</p>
    </div>

    <div class="vfx-container">
        <!-- GAS NEÓN -->
        <div class="gas-contorno"></div>

        <!-- FLAMAS TRASERAS -->
        <img src="aura.webp" class="joya atras">
        
        <!-- SARA (Cárgala como imagen si tienes el render, o mantén el 3D si quieres pero este código es para imagen estática con FX móviles) -->
        <img src="sara.png" class="imante" onerror="this.src='https://placeholder.com'">
        
        <!-- FLAMAS DELANTERAS -->
        <img src="aura.webp" class="joya adelante">
    </div>

</body>
</html>
